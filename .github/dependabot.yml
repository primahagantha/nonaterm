# Dependabot disabled — dependencies managed manually
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "yearly"
    open-pull-requests-limit: 0
  - package-ecosystem: "cargo"
    directory: "/src-tauri"
    schedule:
      interval: "yearly"
    open-pull-requests-limit: 0
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "yearly"
    open-pull-requests-limit: 0
