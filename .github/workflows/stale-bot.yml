name: Stale Bot

on:
  schedule:
    - cron: '0 9 * * *'

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: This issue has been marked stale after 30 days of inactivity.
          stale-pr-message: This PR has been marked stale after 30 days of inactivity.
          days-before-stale: 30
          days-before-close: 7
          exempt-issue-labels: security,keep-open,pinned
          exempt-pr-labels: security,keep-open,pinned
