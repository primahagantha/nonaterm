name: WebDriver E2E (Native)

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: webdriver-${{ github.ref }}
  cancel-in-progress: true

jobs:
  webdriver-windows:
    name: WebDriver E2E (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Install e2e-native dependencies
        run: npm ci
        working-directory: e2e-native

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked

      - name: Get Edge version
        id: edge
        shell: pwsh
        run: |
          $version = (Get-Item "C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe" -ErrorAction SilentlyContinue).VersionInfo.ProductVersion
          if (-not $version) {
            $version = (Get-Item "C:\Program Files\Microsoft\Edge\Application\msedge.exe" -ErrorAction SilentlyContinue).VersionInfo.ProductVersion
          }
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Download Edge WebDriver
        shell: pwsh
        run: |
          $version = "${{ steps.edge.outputs.version }}"
          $url = "https://msedgedriver.azureedge.net/$version/edgedriver_win64.zip"
          Invoke-WebRequest -Uri $url -OutFile "edgedriver.zip"
          Expand-Archive -Path "edgedriver.zip" -DestinationPath "." -Force
          Copy-Item "msedgedriver.exe" -Destination "$HOME\.cargo\bin\msedgedriver.exe" -Force

      - name: Build Tauri app
        run: npx tauri build --no-bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Run WebDriver E2E tests
        run: npm run test:e2e:native
