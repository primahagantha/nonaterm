name: Build & Release

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

jobs:
  # ──────────────────────────────────────────────
  # Lint & Test (runs once, fast feedback)
  # ──────────────────────────────────────────────
  test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: ESLint
        run: npx eslint src/ --max-warnings=0

      - name: Unit Tests
        run: npx vitest run --reporter=verbose

      - name: Type Check
        run: npx tsc -b --noEmit

  # ──────────────────────────────────────────────
  # E2E Tests (Chromium, headless)
  # ──────────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E Tests
        run: npx playwright test --reporter=list

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/

  # ──────────────────────────────────────────────
  # Build Windows
  # ──────────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Build
        run: npx @tauri-apps/cli build

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: nonaterm-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi

      - name: Upload EXE Setup
        uses: actions/upload-artifact@v4
        with:
          name: nonaterm-windows-exe
          path: src-tauri/target/release/bundle/nsis/*.exe

  # ──────────────────────────────────────────────
  # Build macOS (Intel + Apple Silicon)
  # ──────────────────────────────────────────────
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Build
        run: npx @tauri-apps/cli build

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: nonaterm-macos
          path: src-tauri/target/release/bundle/dmg/*.dmg

      - name: Upload App
        uses: actions/upload-artifact@v4
        with:
          name: nonaterm-macos-app
          path: src-tauri/target/release/bundle/macos/*.app

  # ──────────────────────────────────────────────
  # Build Linux (Debian/Ubuntu + AppImage)
  # ──────────────────────────────────────────────
  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - run: npm ci

      - name: Build
        run: npx @tauri-apps/cli build

      - name: Upload Debian Package
        uses: actions/upload-artifact@v4
        with:
          name: nonaterm-linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: nonaterm-linux-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload RPM
        uses: actions/upload-artifact@v4
        with:
          name: nonaterm-linux-rpm
          path: src-tauri/target/release/bundle/rpm/*.rpm

  # ──────────────────────────────────────────────
  # Release (on tag push)
  # ──────────────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-macos, build-linux, e2e]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/**/*.msi
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.app
            artifacts/**/*.deb
            artifacts/**/*.AppImage
            artifacts/**/*.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
